apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app
        image: yahyabichiou/devops-app:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: devops-service
  namespace: devops
spec:
  type: NodePort
  selector:
    app: devops-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
